<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Editar Artigos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        body {
            background: #f8f9fa;
        }

        .table td,
        .table th {
            vertical-align: middle;
        }

        .badge-status {
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container py-4">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>📄 Gerenciador de Artigos</h3>

            <button class="btn btn-success" onclick="novoArtigo()">
                + Adicionar Artigo
            </button>
        </div>

        <div class="card">
            <div class="card-body">

                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Última Atualização</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="articlesTable"></tbody>
                </table>

            </div>
        </div>
    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getFirestore,
            collection,
            getDocs,
            deleteDoc,
            doc,
            updateDoc
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


        import firebaseConfig from "./assets/js/firebase-config.js";

        // 🔐 proteção admin
        if (!sessionStorage.getItem("admin_logado")) {
            window.location.href = "login.html";
        }

        window.editArticle = function (id) {
            window.location.href = `article.html?id=${id}`;
        }

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const table = document.getElementById("articlesTable");

        const statusFlow = ["draft", "reviewed", "published"];

        // guardar valor original
        const originalStatusMap = {};


        function setupStatusListeners() {

            document.querySelectorAll(".status-select").forEach(select => {

                const id = select.getAttribute("data-id");

                originalStatusMap[id] = select.value;

                select.addEventListener("change", () => {

                    const applyBtn = document.getElementById(`apply-${id}`);
                    const cancelBtn = document.getElementById(`cancel-${id}`);

                    if (select.value !== originalStatusMap[id]) {
                        applyBtn.classList.remove("d-none");
                        cancelBtn.classList.remove("d-none");
                    } else {
                        applyBtn.classList.add("d-none");
                        cancelBtn.classList.add("d-none");
                    }
                });
            });
        }

        window.applyStatus = async function (id) {

            const select = document.querySelector(`.status-select[data-id="${id}"]`);
            const newStatus = select.value;

            await updateDoc(doc(db, "articles", id), {
                "user_input.status": [newStatus]
            });

            originalStatusMap[id] = newStatus;

            document.getElementById(`apply-${id}`).classList.add("d-none");
            document.getElementById(`cancel-${id}`).classList.add("d-none");
        }

        window.cancelStatus = function (id) {

            const select = document.querySelector(`.status-select[data-id="${id}"]`);

            select.value = originalStatusMap[id];

            document.getElementById(`apply-${id}`).classList.add("d-none");
            document.getElementById(`cancel-${id}`).classList.add("d-none");
        }

        table.innerHTML = "";

        const snap = await getDocs(collection(db, "articles"));

        snap.forEach((docSnap) => {

            const data = docSnap.data();
            const id = docSnap.id;

            const status = data?.user_input?.status?.[0] || "draft";

            const tr = document.createElement("tr");

            tr.innerHTML = `
                                <td>
                                    <strong>${data?.result?.title || data?.user_input?.title || "Sem título"}</strong>
                                </td>

                                <td>
                                    ${data?.updatedAt ? new Date(data.updatedAt).toLocaleString() : "-"}
                                </td>

                                <td>
                                    <select class="form-select form-select-sm status-select" data-id="${id}">
                                        <option value="draft" ${status === "draft" ? "selected" : ""}>Draft</option>
                                        <option value="reviewed" ${status === "reviewed" ? "selected" : ""}>Reviewed</option>
                                        <option value="published" ${status === "published" ? "selected" : ""}>Published</option>
                                    </select>
                                </td>

                                <td>
                                    <button class="btn btn-primary btn-sm" onclick="editArticle('${id}')">
                                        Editar
                                    </button>

                                    <select id="media-${id}" class="form-select form-select-sm d-inline-block w-auto">
                                        <option value="facebook">Facebook</option>
                                        <option value="instagram">Instagram</option>
                                        <option value="jusbrasil">JusBrasil</option>
                                        <option value="linkedin">LinkedIn</option>
                                        <option value="pinterest">Pinterest</option>
                                        <option value="threads">Threads</option>
                                        <option value="tiktok">TikTok</option>
                                        <option value="whatsapp">WhatsApp</option>
                                        <option value="x_twitter">X/Twitter</option>
                                        <option value="youtube">YouTube</option>
                                    </select>

                                    <button class="btn btn-dark btn-sm" onclick="generateMedia('${id}')">
                                        Gerar Media
                                    </button>

                                    <!-- BOTÕES DINÂMICOS -->
                                    <button class="btn btn-success btn-sm d-none" id="apply-${id}" onclick="applyStatus('${id}')">
                                        Aplicar
                                    </button>

                                    <button class="btn btn-secondary btn-sm d-none" id="cancel-${id}" onclick="cancelStatus('${id}')">
                                        Cancelar
                                    </button>

                                </td>
                            `;

            table.appendChild(tr);
        });


        // ✏️ editar
        window.editArticle = function (id) {
            window.location.href = `article.html?id=${id}`;
        }


        // 🔁 mudar status
        window.changeStatus = async function (id, current) {

            const nextIndex = (statusFlow.indexOf(current) + 1) % statusFlow.length;
            const nextStatus = statusFlow[nextIndex];

            await updateDoc(doc(db, "articles", id), {
                "user_input.status": [nextStatus]
            });

            loadArticles();
        }

        // 🎬 gerar media
        window.generateMedia = function (id) {

            const select = document.getElementById(`media-${id}`);
            const media = select.value;

            window.location.href = `createMedia.html?artigo=${id}&media=${media}`;
        }

        // ➕ novo artigo
        window.novoArtigo = function () {
            window.location.href = `createMedia.html?artigo=new`;
        }

        loadArticles();


        // 📌 carregar artigos
        async function loadArticles() {

            table.innerHTML = "";

            const snap = await getDocs(collection(db, "articles"));

            snap.forEach((docSnap) => {

                const data = docSnap.data();
                const id = docSnap.id;

                const tr = document.createElement("tr");

                tr.innerHTML = `
            <td>
                <strong>${data?.result?.title || data?.user_input?.title || "Sem título"}</strong>
            </td>

            <td>
                ${data?.updatedAt ? new Date(data.updatedAt).toLocaleString() : "-"}
            </td>

            <td>
                <select class="form-select form-select-sm status-select" data-id="${id}">
                    <option value="draft" ${status === "draft" ? "selected" : ""}>Draft</option>
                    <option value="reviewed" ${status === "reviewed" ? "selected" : ""}>Reviewed</option>
                    <option value="published" ${status === "published" ? "selected" : ""}>Published</option>
                </select>
            </td>

            <td>
                <button class="btn btn-primary btn-sm" onclick="editArticle('${id}')">
                    Editar
                </button>

                <select id="media-${id}" class="form-select form-select-sm d-inline-block w-auto">
                    <option value="facebook">Facebook</option>
                    <option value="instagram">Instagram</option>
                    <option value="jusbrasil">JusBrasil</option>
                    <option value="linkedin">LinkedIn</option>
                    <option value="pinterest">Pinterest</option>
                    <option value="threads">Threads</option>
                    <option value="tiktok">TikTok</option>
                    <option value="whatsapp">WhatsApp</option>
                    <option value="x_twitter">X/Twitter</option>
                    <option value="youtube">YouTube</option>
                </select>

                <button class="btn btn-dark btn-sm" onclick="generateMedia('${id}')">
                    Gerar Media
                </button>

                <button class="btn btn-success btn-sm d-none" id="apply-${id}" onclick="applyStatus('${id}')">
                    Aplicar
                </button>

                <button class="btn btn-secondary btn-sm d-none" id="cancel-${id}" onclick="cancelStatus('${id}')">
                    Cancelar
                </button>

            </td>
        `;

                table.appendChild(tr);
            });

            setupStatusListeners(); // 🔥 IMPORTANTE
        }

    </script>

</body>

</html>
