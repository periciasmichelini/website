<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Editar Dados Firebase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
    <div class="container my-4">
        <h2>Editar Dados do Firebase</h2>
        <form id="editForm" class="row g-3">
            <input type="hidden" id="recordId" />

            <div class="col-md-6">
                <label for="name" class="form-label">Nome</label>
                <input type="text" class="form-control" id="name" required />
            </div>

            <div class="col-md-6">
                <label for="organization" class="form-label">Organização</label>
                <input type="text" class="form-control" id="organization" />
            </div>

            <div class="col-md-6">
                <label for="phone" class="form-label">Telefone</label>
                <input type="text" class="form-control" id="phone" />
            </div>

            <div class="col-md-6">
                <label for="website" class="form-label">Website</label>
                <input type="url" class="form-control" id="website" />
            </div>

            <h5>Endereço</h5>

            <div class="col-md-6">
                <label for="street" class="form-label">Rua</label>
                <input type="text" class="form-control" id="street" />
            </div>

            <div class="col-md-3">
                <label for="city" class="form-label">Cidade</label>
                <input type="text" class="form-control" id="city" />
            </div>

            <div class="col-md-2">
                <label for="state" class="form-label">Estado</label>
                <input type="text" class="form-control" id="state" maxlength="2" />
            </div>

            <div class="col-md-3">
                <label for="postalCode" class="form-label">CEP</label>
                <input type="text" class="form-control" id="postalCode" />
            </div>

            <h5>Tipo de negócio</h5>

            <div class="col-12">
                <select multiple class="form-select" id="businessType">
                    <option value="law_firm">Law Firm</option>
                    <option value="clinic">Clinic</option>
                    <option value="consulting">Consulting</option>
                    <!-- Adicione mais opções se quiser -->
                </select>
            </div>

            <h5>Mídias Sociais</h5>

            <div class="col-md-6">
                <label for="facebook" class="form-label">Facebook</label>
                <input type="url" class="form-control" id="facebook" />
            </div>

            <div class="col-md-6">
                <label for="instagram" class="form-label">Instagram</label>
                <input type="url" class="form-control" id="instagram" />
            </div>

            <div class="col-md-6">
                <label for="jusbrasil" class="form-label">Jusbrasil</label>
                <input type="url" class="form-control" id="jusbrasil" />
            </div>

            <div class="col-md-6">
                <label for="linkedin" class="form-label">LinkedIn</label>
                <input type="url" class="form-control" id="linkedin" />
            </div>

            <div class="col-md-6">
                <label for="pinterest" class="form-label">Pinterest</label>
                <input type="url" class="form-control" id="pinterest" />
            </div>

            <div class="col-md-6">
                <label for="threads" class="form-label">Threads</label>
                <input type="url" class="form-control" id="threads" />
            </div>

            <div class="col-md-6">
                <label for="tiktok" class="form-label">TikTok</label>
                <input type="url" class="form-control" id="tiktok" />
            </div>

            <div class="col-md-6">
                <label for="whatsapp" class="form-label">WhatsApp</label>
                <input type="url" class="form-control" id="whatsapp" />
            </div>

            <div class="col-md-6">
                <label for="x_twitter" class="form-label">X (Twitter)</label>
                <input type="url" class="form-control" id="x_twitter" />
            </div>

            <div class="col-md-6">
                <label for="youtube" class="form-label">YouTube</label>
                <input type="url" class="form-control" id="youtube" />
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">Salvar</button>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";


        // Config Firebase
        import firebaseConfig from "./assets/js/firebase-config.js";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Substitua pelo ID real do documento a ser editado
        const docId = "Q8KwxakzV9gKExncbXdf";
        const docRef = doc(db, "metadata", docId);

        const form = document.getElementById("editForm");

        if (!sessionStorage.getItem("admin_logado")) {
            window.location.href = "login.html";
        }

        async function loadData() {
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById("recordId").value = docId;
                document.getElementById("name").value = data.name || "";
                document.getElementById("organization").value = data.organization || "";
                document.getElementById("phone").value = data.phone || "";
                document.getElementById("website").value = data.website || "";

                if (data.address) {
                    document.getElementById("street").value = data.address.street || "";
                    document.getElementById("city").value = data.address.city || "";
                    document.getElementById("state").value = data.address.state || "";
                    document.getElementById("postalCode").value = data.address.postalCode || "";
                }

                if (data.business_type && Array.isArray(data.business_type)) {
                    const select = document.getElementById("businessType");
                    for (const option of select.options) {
                        option.selected = data.business_type.includes(option.value);
                    }
                }

                if (data.socialmedia) {
                    document.getElementById("facebook").value = data.socialmedia.facebook || "";
                    document.getElementById("instagram").value = data.socialmedia.instagram || "";
                    document.getElementById("jusbrasil").value = data.socialmedia.jusbrasil || "";
                    document.getElementById("linkedin").value = data.socialmedia.linkedin || "";
                    document.getElementById("pinterest").value = data.socialmedia.pinterest || "";
                    document.getElementById("threads").value = data.socialmedia.threads || "";
                    document.getElementById("tiktok").value = data.socialmedia.tiktok || "";
                    document.getElementById("whatsapp").value = data.socialmedia.whatsapp || "";
                    document.getElementById("x_twitter").value = data.socialmedia.x_twitter || "";
                    document.getElementById("youtube").value = data.socialmedia.youtube || "";
                }
            } else {
                alert("Documento não encontrado!");
            }
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const businessTypeSelect = document.getElementById("businessType");
            const selectedBusinessTypes = Array.from(businessTypeSelect.selectedOptions).map(opt => opt.value);

            const updatedData = {
                name: document.getElementById("name").value,
                organization: document.getElementById("organization").value,
                phone: document.getElementById("phone").value,
                website: document.getElementById("website").value,
                address: {
                    street: document.getElementById("street").value,
                    city: document.getElementById("city").value,
                    state: document.getElementById("state").value,
                    postalCode: document.getElementById("postalCode").value,
                },
                business_type: selectedBusinessTypes,
                socialmedia: {
                    facebook: document.getElementById("facebook").value,
                    instagram: document.getElementById("instagram").value,
                    instagram: document.getElementById("jusbrasil").value,
                    linkedin: document.getElementById("linkedin").value,
                    pinterest: document.getElementById("pinterest").value,
                    threads: document.getElementById("threads").value,
                    tiktok: document.getElementById("tiktok").value,
                    whatsapp: document.getElementById("whatsapp").value,
                    x_twitter: document.getElementById("x_twitter").value,
                    youtube: document.getElementById("youtube").value,
                },
                updatedAt: serverTimestamp(),
            };

            try {
                await setDoc(docRef, updatedData, { merge: true });
                alert("Dados salvos com sucesso!");
            } catch (error) {
                alert("Erro ao salvar dados: " + error.message);
            }
        });

        loadData();
    </script>
</body>

</html>
