<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editor Completo de Artigo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        body {
            background: #f4f6f9;
        }

        textarea {
            min-height: 90px;
        }

        .section-title {
            margin-top: 25px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container py-4">

        <h3>🧠 Editor Completo de Artigo</h3>

        <input type="hidden" id="articleId">

        <!-- ================= BASIC ================= -->
        <div class="card mt-3">
            <div class="card-body">

                <h5 class="section-title">📌 Dados Básicos</h5>

                <h6 class="section-title">ID</h6>
                <input class="form-control mb-2" id="article_id" placeholder="Article ID" readonly>
                <h6 class="section-title">Data Ultima Alteração</h6>
                <input class="form-control mb-2" id="updatedAt" placeholder="Updated At" readonly>

            </div>
        </div>

        <!-- ================= USER INPUT ================= -->
        <div class="card mt-3">
            <div class="card-body">

                <h5 class="section-title">👤 User Input</h5>

                <input class="form-control mb-2" id="primaryKeyword" placeholder="Primary Keyword">

                <textarea class="form-control mb-2" id="fullTextFromUser" placeholder="Full Text From User"></textarea>

                <button class="btn btn-secondary btn-sm mb-2" onclick="gerarTexto()">
                    GERAR TEXTO
                </button>

                <input class="form-control mb-2" id="initial_snippet" placeholder="Initial Snippet">

                <input class="form-control mb-2" id="intent" placeholder="Intent">

                <input class="form-control mb-2" id="suggested_objective" placeholder="Suggested Objective">

                <input class="form-control mb-2" id="suggested_sector" placeholder="Suggested Sector">

                <input class="form-control mb-2" id="shortSummary" placeholder="Short Summary">

                <input class="form-control mb-2" id="focus" placeholder="Focus">

                <input class="form-control mb-2" id="suggestion_id" placeholder="Suggestion ID">

            </div>
        </div>

        <!-- ================= OPTIMIZATION ================= -->
        <div class="card mt-3">
            <div class="card-body">

                <h5 class="section-title">⚙️ Otimização</h5>

                <textarea class="form-control mb-2" id="authorProfile" placeholder="Author Profile"></textarea>

                <textarea class="form-control mb-2" id="metaTitle" placeholder="Meta Title"></textarea>

                <textarea class="form-control mb-2" id="metaDescription" placeholder="Meta Description"></textarea>

                <input class="form-control mb-2" id="tone" placeholder="Tone">

                <textarea class="form-control mb-2" id="schemaType" placeholder="Schema Type (JSON array)"></textarea>

                <textarea class="form-control mb-2" id="conceptsHighlighted"
                    placeholder="Concepts Highlighted (JSON array)"></textarea>

                <select class="form-select mb-2" id="hasBeenRevised">
                    <option value="false">Not revised</option>
                    <option value="true">Revised</option>
                </select>

            </div>
        </div>

        <!-- ================= RESULT ================= -->
        <div class="card mt-3">
            <div class="card-body">

                <h5 class="section-title">📦 Result</h5>

                <input class="form-control mb-2" id="resultTitle" placeholder="Result Title">

                <textarea class="form-control mb-2" id="text" placeholder="Text"></textarea>

                <textarea class="form-control mb-2" id="CTA" placeholder="CTA"></textarea>

                <textarea class="form-control mb-2" id="hashtags" placeholder="Hashtags (JSON array)"></textarea>

                <textarea class="form-control mb-2" id="bullets" placeholder="Bullets (JSON array)"></textarea>

                <textarea class="form-control mb-2" id="generatedPrompt" placeholder="Generated Prompt"></textarea>

                <textarea class="form-control mb-2" id="generatedArticle" placeholder="Generated Article"></textarea>

            </div>
        </div>

        <button class="btn btn-primary mt-3" onclick="gerar()">
            💾 Gerar Artigo com IA
        </button>

        <button class="btn btn-success mt-3" onclick="salvar()">
            💾 Salvar Tudo
        </button>

    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getFirestore,
            doc,
            getDoc,
            updateDoc
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        import firebaseConfig from "./assets/js/firebase-config.js";
        //import articlePrompt from './assets/js/prompts.js';

        import * as art from './assets/js/article.js';


        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const id = new URLSearchParams(window.location.search).get("id");

        const ref = doc(db, "articles", id);

        document.getElementById("articleId").value = id;

        function coletarDadosDaTela() {

            const artigoData = {
                article_id: document.getElementById("article_id").value,
                updatedAt: new Date().toISOString(),

                user_input: {
                    primaryKeyword: document.getElementById("primaryKeyword").value,
                    fullTextFromUser: document.getElementById("fullTextFromUser").value,
                    initial_snippet: document.getElementById("initial_snippet").value,
                    intent: document.getElementById("intent").value,
                    suggested_objective: document.getElementById("suggested_objective").value,
                    suggested_sector: document.getElementById("suggested_sector").value,
                    shortSummary: document.getElementById("shortSummary").value,
                    focus: document.getElementById("focus").value,
                    suggestion_id: document.getElementById("suggestion_id").value
                },

                otimization: {
                    authorProfile: document.getElementById("authorProfile").value,
                    metaTitle: document.getElementById("metaTitle").value,
                    metaDescription: document.getElementById("metaDescription").value,
                    tone: document.getElementById("tone").value,
                    schemaType: JSON.parse(document.getElementById("schemaType").value || "[]"),
                    conceptsHighlighted: JSON.parse(document.getElementById("conceptsHighlighted").value || "[]"),
                    hasBeenRevised: document.getElementById("hasBeenRevised").value === "true"
                },

                result: {
                    title: document.getElementById("resultTitle").value,
                    text: document.getElementById("text").value,
                    CTA: document.getElementById("CTA").value,
                    hashtags: JSON.parse(document.getElementById("hashtags").value || "[]"),
                    bullets: JSON.parse(document.getElementById("bullets").value || "[]"),
                    generatedPrompt: document.getElementById("generatedPrompt").value,
                    generatedArticle: document.getElementById("generatedArticle").value
                }
            };
            return artigoData;
        }

        // ================= LOAD =================
        async function load() {

            const snap = await getDoc(ref);

            if (!snap.exists()) {
                alert("Artigo não encontrado");
                return;
            }

            const d = snap.data();

            // BASIC

            document.getElementById("article_id")?.setAttribute('value', d?.article_id || "");
            document.getElementById("createdAt")?.setAttribute('value', d?.createdAt || "");
            document.getElementById("updatedAt")?.setAttribute('value', d?.updatedAt || "");

            // USER INPUT
            document.getElementById("primaryKeyword")?.setAttribute('value', d?.user_input?.primaryKeyword || "");
            document.getElementById("fullTextFromUser") && (document.getElementById("fullTextFromUser").value = d?.user_input?.fullTextFromUser || "");
            document.getElementById("initial_snippet")?.setAttribute('value', d?.user_input?.initial_snippet || "");
            document.getElementById("intent")?.setAttribute('value', d?.user_input?.intent || "");
            document.getElementById("suggested_objective")?.setAttribute('value', d?.user_input?.suggested_objective || "");
            document.getElementById("suggested_sector")?.setAttribute('value', d?.user_input?.suggested_sector || "");
            document.getElementById("shortSummary")?.setAttribute('value', d?.user_input?.shortSummary || "");
            document.getElementById("focus")?.setAttribute('value', d?.user_input?.focus || "");
            document.getElementById("suggestion_id")?.setAttribute('value', d?.user_input?.suggestion_id || "");

            // OPTIMIZATION
            document.getElementById("authorProfile") && (document.getElementById("authorProfile").value = d?.otimization?.authorProfile || "");
            document.getElementById("metaTitle") && (document.getElementById("metaTitle").value = d?.otimization?.metaTitle || "");
            document.getElementById("metaDescription") && (document.getElementById("metaDescription").value = d?.otimization?.metaDescription || "");
            document.getElementById("tone")?.setAttribute('value', d?.otimization?.tone || "");
            document.getElementById("schemaType") && (document.getElementById("schemaType").value = JSON.stringify(d?.otimization?.schemaType || []));
            document.getElementById("conceptsHighlighted") && (document.getElementById("conceptsHighlighted").value = JSON.stringify(d?.otimization?.conceptsHighlighted || []));
            document.getElementById("hasBeenRevised")?.setAttribute('value', d?.otimization?.hasBeenRevised || false);

            // RESULT
            document.getElementById("resultTitle")?.setAttribute('value', d?.result?.title || "");
            document.getElementById("text") && (document.getElementById("text").value = d?.result?.text || "");
            document.getElementById("CTA") && (document.getElementById("CTA").value = d?.result?.CTA || "");
            document.getElementById("hashtags") && (document.getElementById("hashtags").value = JSON.stringify(d?.result?.hashtags || []));
            document.getElementById("bullets") && (document.getElementById("bullets").value = JSON.stringify(d?.result?.bullets || []));
            document.getElementById("generatedPrompt") && (document.getElementById("generatedPrompt").value = d?.result?.generatedPrompt || "");
            document.getElementById("generatedArticle") && (document.getElementById("generatedArticle").value = d?.result?.generatedArticle || "");
        }

        // ================= GEARAR COM IA =================
        window.gerar = async function () {

            const promptFinal = articlePrompt.replace("{tema}", tema);

            try {
                const response = await fetch(URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptFinal }] }],
                        generationConfig: { response_mime_type: "application/json" } // Força o JSON
                    })
                });

                const data = await response.json();
                // O Gemini retorna o texto dentro dessa estrutura:
                const rawJson = data.candidates[0].content.parts[0].text;
                const result = JSON.parse(rawJson);

                atualizarCampos(result);
            } catch (error) {
                console.error("Erro na chamada da IA:", error);
            }
        }

        // ================= SAVE =================
        window.salvar = async function () {

            await updateDoc(ref, {

                article_id: document.getElementById("article_id").value,

                updatedAt: new Date().toISOString(),

                user_input: {
                    primaryKeyword: document.getElementById("primaryKeyword").value,
                    fullTextFromUser: document.getElementById("fullTextFromUser").value,
                    initial_snippet: document.getElementById("initial_snippet").value,
                    intent: document.getElementById("intent").value,
                    suggested_objective: document.getElementById("suggested_objective").value,
                    suggested_sector: document.getElementById("suggested_sector").value,
                    shortSummary: document.getElementById("shortSummary").value,
                    focus: document.getElementById("focus").value,
                    suggestion_id: document.getElementById("suggestion_id").value
                },

                otimization: {
                    authorProfile: document.getElementById("authorProfile").value,
                    metaTitle: document.getElementById("metaTitle").value,
                    metaDescription: document.getElementById("metaDescription").value,
                    tone: document.getElementById("tone").value,
                    schemaType: JSON.parse(document.getElementById("schemaType").value || "[]"),
                    conceptsHighlighted: JSON.parse(document.getElementById("conceptsHighlighted").value || "[]"),
                    hasBeenRevised: document.getElementById("hasBeenRevised").value === "true"
                },

                result: {
                    title: document.getElementById("resultTitle").value,
                    text: document.getElementById("text").value,
                    CTA: document.getElementById("CTA").value,
                    hashtags: JSON.parse(document.getElementById("hashtags").value || "[]"),
                    bullets: JSON.parse(document.getElementById("bullets").value || "[]"),
                    generatedPrompt: document.getElementById("generatedPrompt").value,
                    generatedArticle: document.getElementById("generatedArticle").value
                }
            });

            alert("Salvo com sucesso!");
        }

        // ================= GERADOR =================
        window.gerarTexto = function () {
            const keyWordsElement = document.getElementById("primaryKeyword");
            const keyWords = keyWordsElement ? keyWordsElement.value : "";

            const fulltext = art.gerarFullText(keyWords);
            const outputElement = document.getElementById("fullTextFromUser");

            if (outputElement) {
                outputElement.value = fulltext ?? "";
            }
        };
        // window.gerarTexto = function () {

        //     const keyWords = document.getElementById("primaryKeyword");

        //     const fulltext = art.gerarFullText(keyWords);

        //     document.getElementById("fullTextFromUser").value = fulltext ?? "";
        // }

        load();

    </script>


</body>

</html>
